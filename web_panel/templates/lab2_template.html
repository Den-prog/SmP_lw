<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна 2 - База даних</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 60%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-section { margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; width: 400px; }
        .form-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Управління базою даних (SQLitse)</h1>

    <div class="form-section">
        <h3>Додати новий запис</h3>
        <!-- Форма для додавання -->
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Назва товару:</label><br>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Ціна:</label><br>
                <input type="number" step="0.01" name="price" required>
            </div>
            <button type="submit" name="add_product">Додати в БД</button>
        </form>
    </div>

    <hr>

    <h3>Вміст таблиці (Вибірка даних)</h3>
    <table>
        <tr>
            <th>ID</th>
            <th>Назва</th>
            <th>Ціна</th>
            <th>Дія</th>
        </tr>
        <!-- Проходимося циклом по нашому масиву словників -->
        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.title }}</td>
            <td>{{ item.price }}</td>
            <td>
                <!-- Окрема форма для видалення конкретного запису -->
                <form method="POST" style="margin: 0;">
                    {% csrf_token %}
                    <!-- Приховане поле, щоб передати ID запису на сервер -->
                    <input type="hidden" name="record_id" value="{{ item.id }}">
                    <button type="submit" name="delete_product" style="color: red;">Видалити</button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" style="text-align: center;">База даних порожня. Додайте перший запис!</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
