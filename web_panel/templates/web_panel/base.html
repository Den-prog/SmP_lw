<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ header.site_name }}</title>
    <style>
        header { background: #e0f2f1; padding: 10px; border-bottom: 2px solid #004d40; }
        footer { margin-top: 20px; padding: 10px; font-size: 0.8em; color: #666; }
        .card { border: 1px solid #ccc; padding: 15px; margin: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <h1>{{ header.site_name }}</h1>
        <p>Ваш баланс: <strong>{{ header.balance }} сонечок</strong></p>
        <nav>
            {% for link in header.menu %}
                <a href="#">{{ link }}</a> | 
            {% endfor %}
            <a href="{% url 'cart_view' %}">Кошик</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>{{ footer.copyright }}</p>
    </footer>
</body>
</html>
